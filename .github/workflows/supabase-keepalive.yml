name: Supabase Keep-Alive

# 週2回（月・木）、Supabaseの実テーブルを軽く読んで自動停止(Pause)を防ぐ見守りping。
# プロジェクトから応答が返れば成功。まったく繋がらない時だけ失敗＝通知メールで早期発見。

on:
  schedule:
    - cron: '0 3 * * 1,4'   # 毎週 月曜・木曜 03:00 UTC（日本時間 昼12:00ごろ）
  workflow_dispatch: {}       # Actionsタブから手動で実行できるボタン

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase projects
        env:
          U1: ${{ secrets.SUPABASE_URL_TASUKE }}
          K1: ${{ secrets.SUPABASE_KEY_TASUKE }}
          U2: ${{ secrets.SUPABASE_URL_SITTE }}
          K2: ${{ secrets.SUPABASE_KEY_SITTE }}
        run: |
          set -u
          fail=0

          ping() {
            name="$1"; url="$2"; key="$3"; table="$4"
            if [ -z "$url" ] || [ -z "$key" ]; then
              echo "[$name] スキップ（URLかキーが未設定）"
              return 0
            fi
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $key" \
              -H "Authorization: Bearer $key" \
              "${url%/}/rest/v1/${table}?select=*&limit=1")
            echo "[$name] HTTP $code"
            # 000 = そもそも繋がらない（＝停止の疑い）。5xx = サーバ異常。それ以外は「応答あり＝起きている」
            if [ "$code" = "000" ] || [ "$code" -ge 500 ]; then
              echo "[$name] ⚠️ 応答なし／サーバ異常"
              fail=1
            fi
          }

          # たすけAI（テーブル: members）
          ping "たすけAI"      "$U1" "$K1" "members"
          # sitte と ミシカルは同じプロジェクト（テーブル: registrations）
          ping "sitte/ミシカル" "$U2" "$K2" "registrations"

          if [ "$fail" -ne 0 ]; then
            echo "一部プロジェクトに繋がりませんでした"
            exit 1
          fi
          echo "全プロジェクト起きています ✅"
