<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C0392B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="命のカルテ" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
   <link
      href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>命のカルテ</title>
  </head>
  <body>
    <div id="root"></div>
 <script type="module" src="/src/main.tsx"></script>
    <style>
      #google_translate_wrapper {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 9999;
        background: white;
        padding: 8px 12px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border: 2px solid #c0392b;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: 'BIZ UDPGothic', 'Noto Sans JP', sans-serif;
      }
      #google_translate_wrapper .label {
        font-size: 14px;
        font-weight: bold;
        color: #c0392b;
      }
      #google_translate_element .goog-logo-link,
      #google_translate_element .goog-te-gadget > span,
      #google_translate_element img {
        display: none !important;
      }
      #google_translate_element .goog-te-gadget {
        font-size: 0 !important;
        line-height: 0 !important;
      }
      #google_translate_element .goog-te-combo {
        font-size: 16px !important;
        color: #000 !important;
        border: 2px solid #c0392b !important;
        background: white !important;
        font-weight: bold !important;
        font-family: 'BIZ UDPGothic', 'Noto Sans JP', sans-serif !important;
        padding: 6px 10px !important;
        border-radius: 6px !important;
        margin: 0 !important;
        min-width: 120px !important;
        cursor: pointer !important;
      }
      .goog-te-banner-frame,
      .skiptranslate {
        display: none !important;
      }
      body {
        top: 0 !important;
      }
    </style>
    <div id="google_translate_wrapper">
      <span class="label">🌍 言語</span>
      <div id="google_translate_element"></div>
    </div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'ja',
          includedLanguages: 'ja,en,zh-CN,ko,my,vi,tl,ne,id,pt',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
