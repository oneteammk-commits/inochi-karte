name: Supabase Keep-Alive

# 週2回（月・木）、Supabaseの実テーブルを軽く読んで自動停止(Pause)を防ぐ見守りping。
# 新方式キー（sb_publishable_…）と旧方式キー（eyJ…）の両方に自動対応。
# 失敗時は「どこを直せばいいか」を日本語でログに表示します。

on:
  schedule:
    - cron: '0 3 * * 1,4'   # 毎週 月曜・木曜 03:00 UTC（日本時間 昼12:00ごろ）
  workflow_dispatch: {}       # Actionsタブから手動で実行できるボタン

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase projects
        env:
          U1: ${{ secrets.SUPABASE_URL_TASUKE }}
          K1: ${{ secrets.SUPABASE_KEY_TASUKE }}
          U2: ${{ secrets.SUPABASE_URL_SITTE }}
          K2: ${{ secrets.SUPABASE_KEY_SITTE }}
        run: |
          set -u
          fail=0

          check() {
            name="$1"; url="$2"; key="$3"; table="$4"

            if [ -z "$url" ] || [ -z "$key" ]; then
              echo "[$name] ❌ Secret が空です → Settings → Secrets and variables → Actions を確認"
              fail=1
              return 0
            fi

            # 鍵の先頭と長さだけ表示（貼り間違い・欠けの確認用。全体は表示しません）
            prefix=$(printf '%s' "$key" | cut -c1-15)
            echo "[$name] 鍵の先頭: ${prefix}…（長さ ${#key} 文字）"

            if printf '%s' "$key" | grep -q '^sb_publishable_'; then
              # 新方式キー：apikey ヘッダーのみ
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "apikey: $key" \
                "${url%/}/rest/v1/${table}?select=*&limit=1")
            else
              # 旧方式キー（eyJ…）：従来どおり2ヘッダー
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "apikey: $key" \
                -H "Authorization: Bearer $key" \
                "${url%/}/rest/v1/${table}?select=*&limit=1")
            fi
            echo "[$name] HTTP $code"

            case "$code" in
              000)
                echo "[$name] ⚠️ 接続できません（プロジェクト停止の疑い → ダッシュボードで Restore）"
                fail=1 ;;
              401|403)
                echo "[$name] ❌ 鍵が受け付けられていません → Supabase の Settings → API Keys で sb_publishable_… キーをCopyし、Secret を上書きしてください"
                fail=1 ;;
              5*)
                echo "[$name] ⚠️ サーバ異常"
                fail=1 ;;
              *)
                echo "[$name] ✅ 起きています" ;;
            esac
          }

          # たすけAI（テーブル: members）
          check "たすけAI" "$U1" "$K1" "members"
          # sitte と ミシカルは同じプロジェクト（テーブル: registrations）
          check "sitte-ミシカル" "$U2" "$K2" "registrations"

          if [ "$fail" -ne 0 ]; then
            echo "❌ 対応が必要です。上の日本語メッセージのとおり直してください。"
            exit 1
          fi
          echo "✅ 全プロジェクト起きています"
