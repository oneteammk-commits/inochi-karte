name: Supabase Keep-Alive

# 週2回（月・木）、Supabaseプロジェクトを軽く叩いて自動停止(Pause)を防ぐ見守りping。
# うまく応答しなかった場合は GitHub から通知メールが届く（早期発見のおまけ付き）。

on:
  schedule:
    - cron: '0 3 * * 1,4'   # 毎週 月曜・木曜 03:00 UTC（日本時間 昼12:00ごろ）
  workflow_dispatch: {}       # Actionsタブから手動で実行できるボタン

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all Supabase projects
        env:
          U1: ${{ secrets.SUPABASE_URL_TASUKE }}
          K1: ${{ secrets.SUPABASE_KEY_TASUKE }}
          U2: ${{ secrets.SUPABASE_URL_SITTE }}
          K2: ${{ secrets.SUPABASE_KEY_SITTE }}
          U3: ${{ secrets.SUPABASE_URL_MISHIKAL }}
          K3: ${{ secrets.SUPABASE_KEY_MISHIKAL }}
        run: |
          set -u
          fail=0

          ping() {
            name="$1"; url="$2"; key="$3"
            if [ -z "$url" ] || [ -z "$key" ]; then
              echo "[$name] スキップ（URLかキーが未設定）"
              return 0
            fi
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $key" \
              -H "Authorization: Bearer $key" \
              "${url%/}/rest/v1/")
            echo "[$name] HTTP $code"
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "[$name] ⚠️ 応答が異常です"
              fail=1
            fi
          }

          ping "たすけAI" "$U1" "$K1"
          ping "sitte"    "$U2" "$K2"
          ping "ミシカル"  "$U3" "$K3"

          if [ "$fail" -ne 0 ]; then
            echo "一部のプロジェクトで異常がありました"
            exit 1
          fi
          echo "全プロジェクト正常にping完了 ✅"
